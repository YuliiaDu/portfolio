<svg width="2000" height="900" viewBox="0 0 2000 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="titleDesc">
  <title id="titleDesc">UX Research — Accommodation Platform Discovery</title>
  <defs>
    <linearGradient id="darkBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0E0E0E" />
      <stop offset="100%" stop-color="#1A1A1A" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#FF4D00" />
      <stop offset="100%" stop-color="#FF7A33" />
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="b" />
      <feBlend in="SourceGraphic" in2="b" mode="normal" />
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="100%" height="100%" fill="url(#darkBg)" />

  <!-- Soft abstract blob for contrast -->
  <g opacity="0.06">
    <ellipse cx="400" cy="220" rx="360" ry="200" fill="#FF4D00" filter="url(#soft)" />
    <ellipse cx="1400" cy="500" rx="520" ry="260" fill="#FF7A33" filter="url(#soft)" />
  </g>

  <!-- Left panel: Title + subtitle (light text) -->
  <g transform="translate(120,170)">
    <text x="0" y="0" font-family="Fraunces, Georgia, serif" font-weight="700" font-size="96" fill="#F9F8F6">UX Research</text>
    <text x="0" y="92" font-family="DM Sans, system-ui, sans-serif" font-weight="500" font-size="22" fill="#A8A8A8">Accommodation Platform — Discovery Study (2021)</text>

    <rect x="0" y="122" width="460" height="6" rx="3" fill="url(#accent)" />

    <text x="0" y="168" font-family="DM Sans, system-ui, sans-serif" font-size="18" fill="#E8E6E1">
      Mixed-methods research: competitor benchmarking, interview synthesis,
    </text>
    <text x="0" y="192" font-family="DM Sans, system-ui, sans-serif" font-size="18" fill="#E8E6E1">
      proto-personas and journey mapping to inform product strategy.
    </text>
  </g>

  <!-- Right illustration: modern flat shapes -->
  <g transform="translate(1120,160)">
    <!-- Magnifying glass (flat, soft stroke) -->
    <g transform="translate(0,0)">
      <circle cx="96" cy="96" r="72" fill="#111111" stroke="#F9F8F6" stroke-opacity="0.06" stroke-width="2" />
      <circle cx="96" cy="96" r="46" fill="#0E0E0E" stroke="#FF4D00" stroke-width="6" />
      <rect x="150" y="150" width="92" height="16" rx="8" transform="rotate(45 150 150)" fill="#FF4D00" opacity="0.95" />
    </g>

    <!-- Clean bar chart with rounded bars -->
    <g transform="translate(260,32)">
      <rect x="0" y="72" width="36" height="110" rx="10" fill="#2B2B2B" />
      <rect x="56" y="32" width="36" height="150" rx="10" fill="#FF6A3D" />
      <rect x="112" y="56" width="36" height="126" rx="10" fill="#9DA4B2" />
      <rect x="168" y="12" width="36" height="170" rx="10" fill="#FF4D00" />
    </g>

    <!-- Persona cards (flat rounded) -->
    <g transform="translate(48,312)">
      <rect x="0" y="0" width="148" height="96" rx="16" fill="#111111" opacity="0.2" />
      <rect x="164" y="0" width="148" height="96" rx="16" fill="#111111" opacity="0.16" />
      <rect x="82" y="56" width="152" height="14" rx="7" fill="#222" opacity="0.2" />
      <circle cx="36" cy="36" r="26" fill="#FF6A3D" />
      <circle cx="200" cy="36" r="26" fill="#6B6B6B" />
    </g>

    <!-- Small devices / metrics preview -->
    <g transform="translate(380,220)">
      <rect x="0" y="0" width="220" height="120" rx="14" fill="#0E0E0E" stroke="#F9F8F6" stroke-opacity="0.03" />
      <rect x="16" y="20" width="80" height="12" rx="6" fill="#FF4D00" />
      <rect x="16" y="44" width="160" height="10" rx="6" fill="#E8E6E1" opacity="0.12" />
      <rect x="16" y="64" width="120" height="10" rx="6" fill="#E8E6E1" opacity="0.08" />
    </g>
  </g>

  <!-- Bottom-right small label in muted light -->
  <text x="1700" y="840" font-family="DM Sans, system-ui, sans-serif" font-size="14" fill="#A8A8A8">Lead UX Researcher — 2021</text>
</svg>
